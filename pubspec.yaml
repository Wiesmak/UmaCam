name: umacam
description: "Umamusume photo booth"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  equatable: ^2.0.8
  flutter_hooks: ^0.21.3+1
  camera: ^0.12.0
  camera_windows: ^0.2.6+4
  image: ^4.8.0
  share_plus: ^12.0.1
  cross_file: ^0.3.5+2
  dynamic_color: ^1.8.1
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/UmaMusumeTemplate.psd
    - assets/ssr_template/